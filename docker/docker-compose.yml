services:
  pg:
    image: postgres:16-alpine
    container_name: scale-pg
    environment:
      POSTGRES_USER: ${PG_USER:-scale}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-scalepass}
      POSTGRES_DB: ${PG_DB:-scale_system}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      # 主机 5433 → 容器 5432，避开本机已装的 PG
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-scale}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: scale-api
    depends_on:
      pg:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${PG_USER:-scale}:${PG_PASSWORD:-scalepass}@pg:5432/${PG_DB:-scale_system}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-real-secret-min-32-chars-prod}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_TTL_MINUTES: '30'
      REFRESH_TOKEN_TTL_DAYS: '7'
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      APP_ENV: production
      LOG_LEVEL: INFO
      # 串口 transport：默认通过宿主机 socat 桥接 host.docker.internal:6500
      # 可在 docker/.env 中改成 serial:// 或 tcp:// 等其它形态
      SCALE_DEFAULT_TRANSPORT: ${SCALE_DEFAULT_TRANSPORT:-socket://host.docker.internal:6500}
    extra_hosts:
      # Linux Docker 也能解析 host.docker.internal（Mac/Win 自带）
      - "host.docker.internal:host-gateway"
    ports:
      - '${API_PORT:-8000}:8000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: scale-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-8080}:80'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
