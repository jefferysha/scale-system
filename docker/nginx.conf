# Scale Web · nginx SPA + /api 反代

# WebSocket 升级映射：客户端发 Upgrade=websocket 时把 Connection 头改成 upgrade
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  # 监听端口由 envsubst 替换：本地默认 80，Zeabur 注入 PORT=8080 时切换
  listen ${PORT};
  server_name _;

  # gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # 静态资源（hashed 文件名）长缓存
  location /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # 字体/图片
  location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
    root /usr/share/nginx/html;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  # API 反代到上游 api 服务
  # 本地 docker-compose: API_UPSTREAM=api:8000
  # Zeabur 部署:        API_UPSTREAM=<api 服务内网域名>:8000
  # ${API_UPSTREAM} 在容器启动时由 envsubst 替换（NGINX_ENVSUBST_FILTER=^API_）
  location /api/ {
    proxy_pass http://${API_UPSTREAM}/api/;
    proxy_http_version 1.1;
    # WebSocket 必备：协议升级头透传
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WS 长连接超时拉长
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    # 透传 Set-Cookie（refresh cookie 用）
    proxy_pass_header Set-Cookie;
  }

  # /health 直通后端
  location = /health {
    proxy_pass http://${API_UPSTREAM}/health;
  }

  # SPA fallback（React Router）
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # 安全头
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
